<!DOCTYPE html>
<html lang="jp">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>ReazonWeb</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- =========================
     图片系统（统一HTML分区）
========================= -->

<!-- 背景图片 -->
<div class="image-bg">
    <img src="./image/bg2.png" class="bg2">
</div>

<!-- 横幅背景 -->
<div class="image-banner">
    <img src="./image/bg.jpg" class="banner-img">
</div>


<!-- =========================
     主内容
========================= -->

<section class="main">

    <!-- 按钮区域 -->
    <div class="button-section">
        <a href="https://rxr.happyelements.co.jp/" target="_blank"class="btn-large">公式ゲーム『リバ×リバ』</a>
        <div class="btn-small-group">
            <a href="#" class="btn-small">原画</a>
            <a href="#" class="btn-small">声優</a>
            <a href="#" class="btn-small">イラスト</a>
            <a href="#" class="btn-small">情報</a>
        </div>
    </div>

    <!-- 内容图片 -->
    <div class="image-content">
        <div class="content">
            <img src="./image/image.png" alt="レゾンちゃん">
        </div>
    </div>

    <!-- 第二文本图片 -->
    <div class="image-text2">
        <div class="text2">
            <img src="./image/gb3-1.png" alt="文字2">
        </div>
    </div>

    <!-- 标题 -->
    <h1 class="title-page2">レゾンちゃん紹介</h1>

    <!-- 人物图片 -->
    <div class="image-character">
        <img src="./image/character.png" class="character">
    </div>

</section>


<!-- =========================
     版权
========================= -->

<footer class="copyright" id="copyright">
    <button class="copyright-close"
        onclick="document.getElementById('copyright').style.display='none';">
        &times;
    </button>

    該当画像の転載・配布等は禁止しております。<br>
    ©Happy Elements K.K
</footer>

</body>
</html>
